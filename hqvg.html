input,select,textarea,button{font-family:inherit}

const N="#063a63",G="#e0951e";

const sv=async(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const fmt=d=>new Date(d).toLocaleDateString("vi-VN");
const pct=s=>s.toFixed(1)+"%";
const sc=s=>s>=70?"#16a34a":"#dc2626";
const crd=(s={})=>({background:"white",borderRadius:10,border:"1px solid #e2e8f0",...s});
const TH={padding:"9px 14px",textAlign:"left",fontSize:12,color:"#64748b",fontWeight:600,borderBottom:"1px solid #f1f5f9",background:"#f8fafc"};
const TD=(s={})=>({padding:"9px 14px",fontSize:13,borderBottom:"1px solid #fafafa",...s});

const U0=[
  {id:"admin",name:"Quản trị viên",unit:"Ban lãnh đạo",role:"admin",pwd:"admin@vg"},
  {id:"vg001",name:"Nguyễn Văn An",unit:"Đội kiểm soát HQ",role:"user",pwd:"123456"},
  {id:"vg002",name:"Trần Thị Bình",unit:"Đội kiểm soát HQ",role:"user",pwd:"123456"},
  {id:"vg003",name:"Lê Văn Cường",unit:"Đội thủ tục HQ",role:"user",pwd:"123456"},
  {id:"vg004",name:"Phạm Thị Dung",unit:"Đội thủ tục HQ",role:"user",pwd:"123456"},
  {id:"vg005",name:"Hoàng Văn Em",unit:"Đội KTSQ",role:"user",pwd:"123456"},

const QS=[
  {id:1,q:"Luật Chuyển đổi số 148/2025/QH15 có hiệu lực từ ngày nào?",opts:["01/01/2026","01/7/2026","11/12/2025","01/01/2027"],ans:1,exp:"Điều 47 khoản 1: Luật có hiệu lực từ ngày 01 tháng 7 năm 2026."},
  {id:2,q:"Bộ nào là cơ quan đầu mối quản lý nhà nước về chuyển đổi số?",opts:["Bộ TT&TT","Bộ Công an","Bộ KH&CN","Văn phòng Chính phủ"],ans:2,exp:"Điều 15 khoản 2: Bộ KH&CN là cơ quan đầu mối giúp Chính phủ."},
  {id:3,q:"Ngân sách tối thiểu chi cho CĐS là bao nhiêu % tổng chi ngân sách nhà nước?",opts:["0,5%","1%","2%","3%"],ans:1,exp:"Điều 20 khoản 1: Tối thiểu 1% tổng chi ngân sách nhà nước hằng năm."},
  {id:4,q:"Dịch vụ công trực tuyến mặc định phải là hình thức nào theo Điều 32?",opts:["Một phần","Toàn trình","Trực tiếp","Hỗn hợp"],ans:1,exp:"Điều 32 khoản 1a: Dịch vụ công trực tuyến toàn trình là hình thức mặc định."},
  {id:5,q:"Luật CĐS 148/2025/QH15 thay thế luật nào?",opts:["Luật ANM 2018","Luật GDĐT 2023","Luật CNTT 67/2006/QH11","Luật Viễn thông 2023"],ans:2,exp:"Điều 47 khoản 2: Thay thế Luật Công nghệ thông tin số 67/2006/QH11."},
  {id:6,q:"Nguyên tắc CĐS theo Điều 6 khoản 1 lấy ai làm trung tâm?",opts:["Cơ quan nhà nước","Doanh nghiệp","Người sử dụng","Chuyên gia CN"],ans:2,exp:"Điều 6 khoản 1: Lấy NGƯỜI SỬ DỤNG LÀM TRUNG TÂM."},
  {id:7,q:"CBCC yêu cầu nộp thêm giấy tờ đã có trong CSDL số bị xử lý thế nào?",opts:["Nhắc nhở","Xử lý kỷ luật","Phạt tiền","Không chế tài"],ans:1,exp:"Điều 32 khoản 3: Bị xử lý kỷ luật theo quy định pháp luật."},
  {id:8,q:"Vùng KT-XH khó khăn được đầu tư hạ tầng CĐS so với bình quân cả nước?",opts:["Bằng mức bình quân","Thấp hơn","Cao hơn","Tùy địa phương"],ans:2,exp:"Điều 42 khoản 1: Nguồn lực cao hơn mức bình quân cả nước."},
  {id:9,q:"Trẻ em được bảo vệ trên môi trường số từ giai đoạn nào?",opts:["Khi bắt đầu dùng internet","Giai đoạn thiết kế hệ thống số","Khi có khiếu nại","Sau khi triển khai"],ans:1,exp:"Điều 43 khoản 1: Bảo vệ từ GIAI ĐOẠN THIẾT KẾ hệ thống số."},
  {id:10,q:"Năng lực số cơ bản trong chương trình giáo dục là nội dung gì?",opts:["Tự chọn","Chỉ ĐH","Bắt buộc tất cả các cấp","Chỉ THPT"],ans:2,exp:"Điều 17 khoản 1: Là nội dung BẮT BUỘC trong chương trình giáo dục các cấp."},
  {id:11,q:"Chính phủ báo cáo Quốc hội về CĐS với tần suất nào?",opts:["Hằng quý","Hằng năm","Mỗi 2 năm","Khi có sự cố lớn"],ans:1,exp:"Điều 15 khoản 1: Hằng năm báo cáo Quốc hội."},
  {id:12,q:"Luật CĐS áp dụng với phạm vi nào?",opts:["Chỉ CQNN trong nước","Tổ chức, cá nhân trong và ngoài nước liên quan đến CĐS tại VN","Chỉ DN công nghệ","Chỉ tổ chức quốc tế"],ans:1,exp:"Điều 2: Áp dụng với tổ chức, cá nhân TRONG và NGOÀI NƯỚC có liên quan đến CĐS tại Việt Nam."},
  {id:13,q:"\"Hạ tầng số công cộng\" là gì theo Điều 3 khoản 3?",opts:["Toàn bộ HT số của VN","HT số do DNNN quản lý","HT số được chia sẻ, dùng chung phục vụ lợi ích công cộng","HT số đặt tại khu công cộng"],ans:2,exp:"Điều 3 khoản 3: HT số được chia sẻ, dùng chung phục vụ lợi ích công cộng, không phân biệt chủ thể đầu tư."},
  {id:14,q:"\"Số hóa quy trình\" (Điều 3 khoản 9) là gì?",opts:["Chuyển tài liệu giấy thành file điện tử","Dùng CN số tự động hóa, tối ưu hóa quy trình","Cài phần mềm quản lý văn bản","Lưu hồ sơ trên cloud"],ans:1,exp:"Điều 3 khoản 9: Dùng công nghệ số để TỰ ĐỘNG HÓA và TỐI ƯU HÓA quy trình hoạt động."},
  {id:15,q:"\"Chuyển đổi số\" (Điều 3 khoản 1) là quá trình thay đổi gì?",opts:["Trang thiết bị văn phòng","Phương thức hoạt động dựa trên dữ liệu số, hạ tầng số, hệ thống số","Chỉ số hóa tài liệu giấy","Cơ cấu tổ chức bộ máy"],ans:1,exp:"Điều 3 khoản 1: Quá trình thay đổi phương thức hoạt động dựa trên dữ liệu số, hạ tầng số, hệ thống số, nền tảng số."},
];

const C_0=[{id:"cds001",title:"Luật Chuyển đổi số 148/2025/QH15",desc:"Kiểm tra kiến thức Luật CĐS có hiệu lực từ 01/7/2026",time:20,pass:70,qs:QS}];
const R0=[
  {id:"r1",uid:"vg001",cid:"cds001",score:86.7,ok:13,total:15,date:"2026-06-20T08:30:00",ans:{}},
  {id:"r2",uid:"vg002",cid:"cds001",score:73.3,ok:11,total:15,date:"2026-06-20T09:15:00",ans:{}},
  {id:"r3",uid:"vg003",cid:"cds001",score:93.3,ok:14,total:15,date:"2026-06-21T10:00:00",ans:{}},
  {id:"r4",uid:"vg004",cid:"cds001",score:66.7,ok:10,total:15,date:"2026-06-21T11:30:00",ans:{}},

];

function Login({users,onLogin}){
  const[id,sId]=useState(""),[pw,sPw]=useState(""),[err,sErr]=useState(""),[show,sShow]=useState(false);
  const go=demo=>{
    const[u2,p2]=demo?["vg001","123456"]:[id.trim(),pw];
    const u=users.find(x=>x.id===u2&&x.pwd===p2);
    u?onLogin(u):sErr("ID hoặc mật khẩu không đúng");
  };
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:`linear-gradient(150deg,${N} 0%,#0a5a9e 100%)`}}>
      <div style={crd({padding:36,width:340,borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"})}>
        <div style={{textAlign:"center",marginBottom:26}}>
          <div style={{width:68,height:68,borderRadius:"50%",background:N,margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,color:G,border:`2px solid ${G}`}}>⚓</div>
          <div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>Cục Hải quan Quảng Ninh</div>
          <div style={{fontSize:16,fontWeight:700,color:N}}>HQ Cửa khẩu cảng Vạn Gia</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>Hệ thống trắc nghiệm kiến thức</div>
        </div>
        <div style={{marginBottom:11}}>
          <label style={{fontSize:12,color:"#374151",display:"block",marginBottom:4}}>ID-CBCC hoặc USER</label>
          <input value={id} onChange={e=>{sId(e.target.value);sErr("");}} placeholder="Nhập ID-CBCC..."
            style={{width:"100%",padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,outline:"none"}}
            onKeyDown={e=>e.key==="Enter"&&go(false)}/>
        </div>
        <div style={{marginBottom:16,position:"relative"}}>
          <label style={{fontSize:12,color:"#374151",display:"block",marginBottom:4}}>Mật khẩu</label>
          <input type={show?"text":"password"} value={pw} onChange={e=>{sPw(e.target.value);sErr("");}} placeholder="Nhập mật khẩu..."
            style={{width:"100%",padding:"9px 34px 9px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,outline:"none"}}
            onKeyDown={e=>e.key==="Enter"&&go(false)}/>
          <button onClick={()=>sShow(!show)} style={{position:"absolute",right:9,top:28,background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:14,padding:0}}>{show?"🙈":"👁"}</button>
        </div>
        {err&&<div style={{marginBottom:11,padding:"8px 11px",background:"#fef2f2",color:"#991b1b",borderRadius:7,fontSize:12}}>{err}</div>}
        <button onClick={()=>go(false)} style={{width:"100%",padding:10,background:N,color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:8}}>Đăng nhập</button>
        <button onClick={()=>go(true)} style={{width:"100%",padding:9,background:"none",color:N,border:`1px solid ${N}`,borderRadius:8,fontSize:13,cursor:"pointer"}}>Dùng thử không lưu kết quả</button>
        <div style={{marginTop:12,padding:9,background:"#f8fafc",borderRadius:7,fontSize:11,color:"#64748b",textAlign:"center"}}>Demo: <strong>admin</strong>/admin@vg &nbsp;·&nbsp; <strong>vg001–vg005</strong>/123456</div>
      </div>
    </div>
  );
}

function Sidebar({pg,nav,user,onLogout,onPwd}){
  const item=(icon,lbl,id)=>(
    <div onClick={()=>nav(id)} key={id} style={{padding:"9px 14px 9px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,
      background:pg===id?"rgba(255,255,255,0.17)":"transparent",borderLeft:`3px solid ${pg===id?G:"transparent"}`,
      color:pg===id?"white":"rgba(255,255,255,0.68)",fontSize:13,userSelect:"none"}}>
      <i className={`ti ti-${icon}`} style={{fontSize:15,flexShrink:0}}/>{lbl}
    </div>
  );
  const sec=lbl=><div style={{padding:"12px 14px 5px",fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.38)",letterSpacing:1.5}}>{lbl}</div>;
  return(
    <div style={{width:215,background:N,display:"flex",flexDirection:"column",height:"100%",overflowY:"auto",flexShrink:0}}>
      <div style={{padding:"15px 14px 12px",borderBottom:"1px solid rgba(255,255,255,0.1)",textAlign:"center"}}>
        <div style={{width:46,height:46,borderRadius:"50%",background:"rgba(255,255,255,0.11)",margin:"0 auto 7px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:G}}>⚓</div>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:10,letterSpacing:1,marginBottom:2}}>HẢI QUAN VẠN GIA</div>
        <div style={{color:G,fontSize:11,fontWeight:700}}>Trắc nghiệm kiến thức</div>
      </div>
      <div style={{flex:1,paddingTop:4}}>
        {sec("HỌC TẬP")}
        {item("home","Tổng quan","tonquan")}
        {item("book-2","Khóa học","khoahoc")}
        {sec("TRẮC NGHIỆM")}
        {item("player-play","Làm bài","lambai")}
        {item("chart-bar","Kết quả của tôi","ketquatoi")}
        {item("users","Kết quả đơn vị","ketquadonvi")}
        {item("trophy","Kết quả toàn đơn vị","ketquachicuc")}
        {user.role==="admin"&&<>
          {sec("QUẢN TRỊ")}
          {item("notebook","Quản lý khóa học","admin_courses")}
          {item("upload","Nhập khóa học JSON","admin_json")}
          {item("settings","Cài đặt hệ thống","admin_settings")}
        </>}
      </div>
      <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",padding:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:N,flexShrink:0}}>
            {user.name.split(" ").pop()[0].toUpperCase()}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"white",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
            <div style={{color:"rgba(255,255,255,0.42)",fontSize:11}}>{user.id}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={onPwd} style={{flex:1,padding:"5px 4px",background:"rgba(255,255,255,0.09)",color:"rgba(255,255,255,0.75)",border:"none",borderRadius:6,fontSize:11,cursor:"pointer"}}>Đổi MK</button>
          <button onClick={onLogout} style={{flex:1,padding:"5px 4px",background:"rgba(224,149,30,0.22)",color:G,border:"none",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600}}>Đăng xuất</button>
        </div>
      </div>
    </div>
  );
}

function Dashboard({user,results,courses,users}){
  const mr=results.filter(r=>r.uid===user.id);
  const best=mr.length?Math.max(...mr.map(r=>r.score)):null;
  const avg=mr.length?mr.reduce((s,r)=>s+r.score,0)/mr.length:null;
  const recent=[...results].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const Stat=({l,v,c="#1e293b"})=>(
    <div style={crd({padding:"14px 15px"})}>
      <div style={{fontSize:11,color:"#64748b",marginBottom:3}}>{l}</div>
      <div style={{fontSize:24,fontWeight:700,color:c}}>{v??"-"}</div>
    </div>
  );
  return(
    <div style={{padding:20}}>
      <h2 style={{color:N,margin:"0 0 3px",fontSize:20}}>Tổng quan</h2>
      <p style={{margin:"0 0 16px",color:"#64748b",fontSize:13}}>Xin chào, <strong>{user.name}</strong> – {user.unit}</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10,marginBottom:16}}>
        <Stat l="Số lần làm bài" v={mr.length}/>
        <Stat l="Điểm cao nhất" v={best!=null?pct(best):null} c={sc(best??0)}/>
        <Stat l="Điểm trung bình" v={avg!=null?pct(avg):null}/>
        <Stat l="Bài đạt (≥70%)" v={mr.filter(r=>r.score>=70).length} c="#16a34a"/>
      </div>
      <div style={crd()}>
        <div style={{padding:"11px 15px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:600,color:N,fontSize:13}}>Kết quả gần đây</span>
          <span style={{fontSize:11,color:"#94a3b8"}}>{results.length} bài tổng cộng</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
            <thead><tr>{["CBCC","Đơn vị","Khóa học","Điểm","Đúng/Tổng","Ngày"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
            <tbody>
              {recent.map(r=>{
                const u=users.find(x=>x.id===r.uid)||{name:r.uid,unit:""};
                const c=courses.find(x=>x.id===r.cid);
                return <tr key={r.id}>
                  <td style={TD()}>{u.name}</td>
                  <td style={TD({color:"#64748b",fontSize:11})}>{u.unit}</td>
                  <td style={TD({fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"})}>{c?.title||r.cid}</td>
                  <td style={TD()}><span style={{fontWeight:700,color:sc(r.score)}}>{pct(r.score)}</span></td>
                  <td style={TD({color:"#64748b"})}>{r.ok}/{r.total}</td>
                  <td style={TD({fontSize:11,color:"#94a3b8"})}>{fmt(r.date)}</td>
                </tr>;
              })}
              {!results.length&&<tr><td colSpan={6} style={{padding:28,textAlign:"center",color:"#94a3b8",fontSize:13}}>Chưa có kết quả nào</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function CoursesPage({courses,results,user,onStart}){
  return(
    <div style={{padding:20}}>
      <h2 style={{color:N,margin:"0 0 3px",fontSize:20}}>Khóa học</h2>
      <p style={{margin:"0 0 16px",color:"#64748b",fontSize:13}}>Các khóa học trắc nghiệm của đơn vị</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>
        {courses.map(c=>{
          const mr=results.filter(r=>r.uid===user.id&&r.cid===c.id);
          const best=mr.length?Math.max(...mr.map(r=>r.score)):null;
          return(
            <div key={c.id} style={crd({overflow:"hidden"})}>
              <div style={{background:N,padding:"16px 18px",color:"white"}}>
                <div style={{fontSize:10,letterSpacing:1,color:"rgba(255,255,255,0.5)",marginBottom:5}}>TRẮC NGHIỆM</div>
                <div style={{fontWeight:700,fontSize:14,lineHeight:1.4}}>{c.title}</div>
              </div>
              <div style={{padding:"14px 16px"}}>
                <p style={{color:"#64748b",fontSize:12,margin:"0 0 12px",lineHeight:1.5}}>{c.desc}</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:12}}>
                  {[["Câu hỏi",c.qs.length,N],["Thời gian",c.time+"'",N],["Điểm đạt",c.pass+"%",sc(c.pass)]].map(([l,v,col])=>(
                    <div key={l} style={{textAlign:"center",padding:"9px 4px",background:"#f8fafc",borderRadius:8}}>
                      <div style={{fontSize:19,fontWeight:700,color:col}}>{v}</div>
                      <div style={{fontSize:10.5,color:"#64748b",marginTop:1}}>{l}</div>
                    </div>
                  ))}
                </div>
                {best!=null&&<div style={{marginBottom:10,padding:"7px 11px",borderRadius:7,fontSize:12,background:best>=c.pass?"#f0fdf4":"#fef2f2",color:sc(best)}}>
                  Điểm cao nhất: <strong>{pct(best)}</strong> {best>=c.pass?"✓ Đạt":"✗ Chưa đạt"}
                </div>}
                <button onClick={()=>onStart(c)} style={{width:"100%",padding:9,background:N,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                  {mr.length?"Làm lại →":"Bắt đầu →"}

function QuizFlow({quiz,setQuiz,user,addResult,courses}){
  if(!quiz)return(
    <div style={{padding:20}}>
      <h2 style={{color:N,margin:"0 0 16px",fontSize:20}}>Làm bài trắc nghiệm</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:13}}>
        {courses.map(c=>(
          <div key={c.id} onClick={()=>setQuiz({course:c,idx:0,ans:{},secs:c.time*60})} style={crd({padding:18,cursor:"pointer"})}>
            <div style={{fontWeight:700,color:N,marginBottom:6,fontSize:14}}>{c.title}</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>{c.qs.length} câu · {c.time} phút · Đạt: {c.pass}%</div>
            <button style={{padding:"7px 16px",background:N,color:"white",border:"none",borderRadius:7,cursor:"pointer",fontSize:13}}>Bắt đầu →</button>
          </div>
        ))}
        {!courses.length&&<p style={{color:"#94a3b8"}}>Chưa có khóa học nào</p>}
      </div>

  );

  return <QuizResult quiz={quiz} setQuiz={setQuiz}/>;
}

function QuizTaking({quiz,setQuiz,user,addResult}){
  const{course,idx,ans,secs}=quiz;
  const qs=course.qs,q=qs[idx];
  const doneRef=useRef(false);
  const finish=a=>{
    if(doneRef.current)return;
    doneRef.current=true;
    const ok=qs.filter((q,i)=>a[i]===q.ans).length;
    const score=Math.round(ok/qs.length*1000)/10;
    const result={id:"r"+Date.now(),uid:user.id,cid:course.id,score,ok,total:qs.length,date:new Date().toISOString(),ans:a};
    addResult(result);
    setQuiz(prev=>({...prev,result}));
  };
  const finRef=useRef(finish);
  finRef.current=finish;
  useEffect(()=>{
    const t=setInterval(()=>{
      setQuiz(q=>{
        if(!q||q.result)return q;
        const ns=q.secs-1;
        if(ns<=0){clearInterval(t);setTimeout(()=>finRef.current(q.ans),0);return{...q,secs:0};}
        return{...q,secs:ns};
      });
    },1000);
    return()=>clearInterval(t);
  },[]);
  const mm=String(Math.floor(secs/60)).padStart(2,"0");
  const ss_=String(secs%60).padStart(2,"0");
  const answered=Object.keys(ans).length;
  const urgent=secs<=60;
  return(
    <div style={{padding:20}}>
      <div style={crd({padding:"11px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8})}>
        <div>
          <div style={{fontWeight:700,color:N,fontSize:13}}>{course.title}</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Câu {idx+1}/{qs.length} · Đã trả lời: {answered}/{qs.length}</div>
        </div>
        <div style={{textAlign:"center",padding:"5px 13px",background:urgent?"#fef2f2":"#f0f4f8",borderRadius:8}}>
          <div style={{fontSize:22,fontWeight:800,color:urgent?"#dc2626":N,fontVariantNumeric:"tabular-nums",letterSpacing:1}}>{mm}:{ss_}</div>
          <div style={{fontSize:10,color:"#64748b"}}>Còn lại</div>
        </div>
      </div>
      <div style={crd({padding:"10px 12px",marginBottom:12,display:"flex",flexWrap:"wrap",gap:5})}>
        {qs.map((_,i)=>(
          <button key={i} onClick={()=>setQuiz(p=>({...p,idx:i}))}
            style={{width:30,height:30,borderRadius:6,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",
              background:i===idx?N:ans[i]!=null?"#dbeafe":"white",
              color:i===idx?"white":ans[i]!=null?N:"#374151",
              borderColor:i===idx?N:ans[i]!=null?N:"#e2e8f0"}}>
            {i+1}
          </button>
        ))}
      </div>
      <div style={crd({padding:20,marginBottom:12})}>
        <div style={{fontSize:12,color:"#64748b",marginBottom:9}}>Câu {idx+1}</div>
        <div style={{fontSize:15,fontWeight:600,color:"#1e293b",marginBottom:16,lineHeight:1.6}}>{q.q}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {q.opts.map((opt,i)=>(
            <label key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 13px",borderRadius:8,
              border:`1.5px solid ${ans[idx]===i?N:"#e2e8f0"}`,
              background:ans[idx]===i?"rgba(6,58,99,0.05)":"white",cursor:"pointer"}}>
              <input type="radio" name={`q${idx}`} checked={ans[idx]===i}
                onChange={()=>setQuiz(p=>({...p,ans:{...p.ans,[idx]:i}}))} style={{marginTop:2,flexShrink:0}}/>
              <span style={{fontSize:14,color:"#374151",lineHeight:1.5}}>
                <strong style={{color:N,marginRight:5}}>{["A","B","C","D"][i]}.</strong>{opt}
              </span>
            </label>
          ))}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>setQuiz(p=>({...p,idx:Math.max(0,p.idx-1)}))} disabled={idx===0}
          style={{padding:"8px 16px",background:"white",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13,cursor:idx===0?"not-allowed":"pointer",color:idx===0?"#94a3b8":"#374151"}}>
          ← Câu trước
        </button>
        {idx<qs.length-1
          ?<button onClick={()=>setQuiz(p=>({...p,idx:p.idx+1}))} style={{padding:"8px 18px",background:N,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Câu tiếp →</button>
          :<button onClick={()=>finish(ans)} style={{padding:"8px 18px",background:answered<qs.length?"#f59e0b":"#16a34a",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>
            {answered<qs.length?`Nộp (còn ${qs.length-answered} câu)`:"Nộp bài ✓"}
          </button>}
      </div>
    </div>
  );
}

function QuizResult({quiz,setQuiz}){

  return(
    <div style={{padding:20}}>

          <div style={{fontSize:44,marginBottom:6}}>{passed?"🎉":"😔"}</div>
          <div style={{fontSize:42,fontWeight:800}}>{pct(result.score)}</div>
          <div style={{fontSize:18,fontWeight:600,marginTop:7}}>{passed?"ĐẠT":"CHƯA ĐẠT"}</div>
          <div style={{fontSize:12,opacity:0.7,marginTop:3}}>{course.title}</div>
        </div>
        <div style={{padding:22}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:18}}>
            {[["Câu đúng",result.ok,"#16a34a","#f0fdf4"],["Câu sai",result.total-result.ok,"#dc2626","#fef2f2"],["Tổng câu",result.total,"#374151","#f8fafc"]].map(([l,v,c,bg])=>(

            <button onClick={()=>sRev(!rev)} style={{flex:1,padding:10,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13,cursor:"pointer"}}>
              {rev?"Ẩn đáp án":"Xem đáp án & giải thích"}
            </button>
            <button onClick={()=>setQuiz({course,idx:0,ans:{},secs:course.time*60})} style={{flex:1,padding:10,background:N,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Làm lại</button>
          </div>
          {rev&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {course.qs.map((q,i)=>{
                const chosen=result.ans[i],correct=q.ans,right=chosen===correct;
                return(
                  <div key={i} style={{padding:14,borderRadius:8,background:right?"#f0fdf4":"#fef2f2",border:`1px solid ${right?"#bbf7d0":"#fecaca"}`}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:8,color:right?"#166534":"#991b1b"}}>{right?"✓":"✗"} Câu {i+1}: {q.q}</div>
                    {q.opts.map((opt,j)=>(
                      <div key={j} style={{fontSize:13,padding:"4px 8px",borderRadius:4,marginBottom:2,
                        background:j===correct?"rgba(22,163,74,0.08)":j===chosen&&!right?"rgba(220,38,38,0.08)":"transparent",
                        color:j===correct?"#166534":j===chosen&&!right?"#991b1b":"#374151",fontWeight:j===correct?600:400}}>
                        {["A","B","C","D"][j]}. {opt}{j===correct?" ✓":""}{j===chosen&&!right?" ← bạn chọn":""}
                      </div>
                    ))}
                    <div style={{fontSize:12,color:"#4b5563",marginTop:8,padding:"7px 10px",background:"rgba(255,255,255,0.7)",borderRadius:5,lineHeight:1.5}}>💡 {q.exp}</div>
                  </div>
                );

          )}
        </div>
      </div>
    </div>
  );
}

function AdminJsonPage({courses,setCourses}){
  const[json,sJson]=useState("");const[msg,sMsg]=useState(null);
  const sample=`[
  {
    "id": "khoa002",
    "title": "Tên khóa học mới",
    "desc": "Mô tả ngắn",
    "time": 20,
    "pass": 70,
    "qs": [
      {
        "id": 1,
        "q": "Nội dung câu hỏi?",
        "opts": ["Đáp án A","Đáp án B","Đáp án C","Đáp án D"],
        "ans": 0,
        "exp": "Giải thích tại sao đáp án đúng"
      }
    ]
  }
]`;
  const imp=()=>{
    try{
      const data=JSON.parse(json);

      for(const c of data){const i=merged.findIndex(x=>x.id===c.id);if(i>=0)merged[i]=c;else merged.push(c);}
      setCourses(merged);sMsg({ok:true,t:`Nhập thành công ${data.length} khóa học`});sJson("");
    }catch(e){sMsg({ok:false,t:"Lỗi: "+e.message});}
  };
  return <div style={{padding:20}}>
    <h2 style={{color:N,margin:"0 0 3px",fontSize:20}}>Nhập khóa học JSON</h2>
    <p style={{margin:"0 0 14px",color:"#64748b",fontSize:13}}>Nhập nhiều khóa học cùng lúc qua file JSON</p>
    <div style={crd({padding:16,marginBottom:14})}>
      <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:7}}>Cấu trúc JSON mẫu:</div>
      <pre style={{background:"#1e293b",color:"#e2e8f0",padding:12,borderRadius:7,fontSize:11.5,overflow:"auto",maxHeight:180,lineHeight:1.6}}>{sample}</pre>
      <div style={{fontSize:11.5,color:"#64748b",marginTop:8}}><strong>ans</strong>: chỉ số đáp án đúng (0=A, 1=B, 2=C, 3=D)</div>
    </div>
    {msg&&<div style={{marginBottom:12,padding:"8px 11px",borderRadius:7,background:msg.ok?"#f0fdf4":"#fef2f2",color:msg.ok?"#166534":"#991b1b",fontSize:13}}>{msg.t}</div>}
    <label style={{fontSize:13,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Dán JSON vào đây:</label>
    <textarea value={json} onChange={e=>sJson(e.target.value)} placeholder="Dán JSON của bạn tại đây..."
      style={{width:"100%",height:180,padding:11,border:"1px solid #d1d5db",borderRadius:8,fontSize:12,fontFamily:"monospace",resize:"vertical",outline:"none"}}/>
    <button onClick={imp} style={{marginTop:10,padding:"9px 20px",background:json.trim()?N:"#94a3b8",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:json.trim()?"pointer":"not-allowed"}}>
      Nhập khóa học
    </button>
  </div>;
}

      <div style={{fontWeight:600,color:N,marginBottom:12,fontSize:13}}>Thêm CBCC mới</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:9,marginBottom:10}}>
        {[["ID đăng nhập","id","text"],["Họ và tên","name","text"],["Đơn vị","unit","text"],["Mật khẩu","pwd","password"]].map(([l,k,t])=>(
          <div key={k}>
            <label style={{fontSize:12,display:"block",marginBottom:4,color:"#374151"}}>{l}</label>
            <input type={t} value={form[k]} onChange={e=>sForm(p=>({...p,[k]:e.target.value}))}
              style={{width:"100%",padding:"7px 10px",border:"1px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none"}}/>
          </div>
        ))}
        <div>
          <label style={{fontSize:12,display:"block",marginBottom:4,color:"#374151"}}>Quyền</label>
          <select value={form.role} onChange={e=>sForm(p=>({...p,role:e.target.value}))}
            style={{width:"100%",padding:"7px 10px",border:"1px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none"}}>
            <option value="user">CBCC</option><option value="admin">Quản trị</option>
          </select>
        </div>
      </div>
      {msg&&<div style={{marginBottom:9,fontSize:12.5,color:msg.ok?"#166534":"#991b1b"}}>{msg.t}</div>}
      <button onClick={add} style={{padding:"8px 18px",background:N,color:"white",border:"none",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}}>Thêm tài khoản</button>
    </div>
    <div style={crd()}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
      <thead><tr>{["ID","Họ tên","Đơn vị","Quyền","Mật khẩu"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
      <tbody>{users.map(u=>(
        <tr key={u.id}>
          <td style={TD({fontWeight:600,color:N})}>{u.id}</td>
          <td style={TD()}>{u.name}</td>
          <td style={TD({fontSize:12,color:"#64748b"})}>{u.unit}</td>
          <td style={TD()}><span style={{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,background:u.role==="admin"?"rgba(6,58,99,0.1)":"#f1f5f9",color:u.role==="admin"?N:"#64748b"}}>{u.role==="admin"?"Quản trị":"CBCC"}</span></td>
          <td style={TD({fontSize:12,color:"#94a3b8",fontFamily:"monospace"})}>{u.pwd}</td>
        </tr>
      ))}</tbody>
    </table></div></div>
  </div>;
}

function ChangePwdModal({user,users,setUsers,onClose}){
  const[old,sOld]=useState(""),[n1,sN1]=useState(""),[n2,sN2]=useState(""),[err,sErr]=useState(""),[ok,sOk]=useState(false);
  const save=()=>{
    if(old!==user.pwd){sErr("Mật khẩu cũ không đúng");return;}
    if(n1.length<6){sErr("Mật khẩu mới phải ≥ 6 ký tự");return;}
    if(n1!==n2){sErr("Mật khẩu mới không khớp");return;}
    setUsers(users.map(u=>u.id===user.id?{...u,pwd:n1}:u));sOk(true);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={crd({padding:26,width:320,borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.25)"})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{margin:0,color:N,fontSize:16}}>Đổi mật khẩu</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8",lineHeight:1}}>✕</button>
        </div>
        {ok?<div style={{textAlign:"center",padding:20}}>
          <div style={{fontSize:42,marginBottom:8}}>✓</div>
          <div style={{color:"#16a34a",fontWeight:600,marginBottom:14}}>Đổi mật khẩu thành công!</div>
          <button onClick={onClose} style={{padding:"8px 18px",background:N,color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:13}}>Đóng</button>
        </div>:<>
          {[["Mật khẩu cũ","password",old,sOld],["Mật khẩu mới","password",n1,sN1],["Nhập lại mật khẩu mới","password",n2,sN2]].map(([l,t,v,sv_],i)=>(
            <div key={i} style={{marginBottom:11}}>
              <label style={{fontSize:12,display:"block",marginBottom:4,color:"#374151"}}>{l}</label>
              <input type={t} value={v} onChange={e=>{sv_(e.target.value);sErr("");}}
                style={{width:"100%",padding:"8px 11px",border:"1px solid #d1d5db",borderRadius:7,fontSize:13,outline:"none"}}
                onKeyDown={e=>e.key==="Enter"&&save()}/>
            </div>
          ))}
          {err&&<div style={{marginBottom:11,padding:"7px 11px",background:"#fef2f2",color:"#991b1b",borderRadius:7,fontSize:12}}>{err}</div>}
          <div style={{display:"flex",gap:9}}>
            <button onClick={onClose} style={{flex:1,padding:9,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13,cursor:"pointer"}}>Hủy</button>
            <button onClick={save} style={{flex:1,padding:9,background:N,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Lưu</button>
          </div>
        </>}
      </div>
    </div>
  );
}

export default function App(){
  const[user,sUser]=useState(null);
  const[pg,sPg]=useState("tonquan");
  const[users,_sUsers]=useState(U0);
  const[courses,_sCourses]=useState(C_0);
  const[results,_sResults]=useState(R0);
  const[quiz,sQuiz]=useState(null);
  const[modal,sModal]=useState(null);
  const[loading,sLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      const u=await load("vg-users"),c=await load("vg-courses"),r=await load("vg-results");
      if(u)_sUsers(u);if(c)_sCourses(c);if(r)_sResults(r);
      sLoading(false);
    })();
  },[]);
  const setUsers=async v=>{_sUsers(v);await sv("vg-users",v);};
  const setCourses=async v=>{_sCourses(v);await sv("vg-courses",v);};
  const addResult=r=>_sResults(p=>{const n=[...p,r];sv("vg-results",n);return n;});
  const nav=p=>{if(p!=="lambai")sQuiz(null);sPg(p);};
  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"system-ui"}}><div style={{color:N,fontSize:16}}>Đang tải hệ thống...</div></div>;
  if(!user)return <Login users={users} onLogin={u=>{sUser(u);sPg("tonquan");}}/>;
  const pages={
    tonquan:<Dashboard user={user} results={results} courses={courses} users={users}/>,
    khoahoc:<CoursesPage courses={courses} results={results} user={user} onStart={c=>{sQuiz({course:c,idx:0,ans:{},secs:c.time*60});sPg("lambai");}}/>,
    lambai:<QuizFlow quiz={quiz} setQuiz={sQuiz} user={user} addResult={addResult} courses={courses}/>,
    ketquatoi:<MyResultsPage results={results} user={user} courses={courses}/>,
    ketquadonvi:<UnitResultsPage results={results} users={users} courses={courses} user={user}/>,
    ketquachicuc:<AllResultsPage results={results} users={users} courses={courses}/>,
    admin_courses:<AdminCoursesPage courses={courses} setCourses={setCourses}/>,
    admin_json:<AdminJsonPage courses={courses} setCourses={setCourses}/>,
    admin_settings:<AdminSettingsPage users={users} setUsers={setUsers}/>,
  };
  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:"'Segoe UI',system-ui,sans-serif",position:"relative"}}>
      <Sidebar pg={pg} nav={nav} user={user} onLogout={()=>{sUser(null);sQuiz(null);}} onPwd={()=>sModal("pwd")}/>
      <div style={{flex:1,overflowY:"auto",background:"#f0f4f8"}}>{pages[pg]||pages.tonquan}</div>
      {modal==="pwd"&&<ChangePwdModal user={user} users={users} setUsers={setUsers} onClose={()=>sModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
